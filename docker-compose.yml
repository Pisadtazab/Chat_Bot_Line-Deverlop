version: "3.8"

services:
  web:
    image: nginx:alpine
    container_name: chatbot
    volumes:
        # เข้าถึงไฟล์ HTML ใน โฟรเดอร์ที่เก็บโปรเจ็่คนี้
      - .:/usr/share/nginx/html:ro
    ports:
      - "8000:80"

  ngrok: 
    image: ngrok/ngrok:latest
    container_name: ngrok # ชื่อคอนเทนเนอร์ของมัน
    depends_on:
      - web # เป็นตัวเปิดใช้งาน ngrok
    command: 
      - "http"
      - "web:80"
    environment:
        # ngrok authtoken สำหรับผูกบัญชี
      - NGROK_AUTHTOKEN=${NGROK_TOKEN}
    ports:
        # port ที่ใช้ในการเปิด localhost ของ ngrok
      - 4040:4040 
    env_file:
        # เข้าถึง environment เพื่อดึง token ngrok มาใช้งาน
      - ./.env